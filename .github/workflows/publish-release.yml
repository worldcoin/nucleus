name: Publish Nucleus Release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: publish-release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      target_sha: ${{ steps.plan.outputs.target_sha }}
      publish: ${{ steps.tag.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect merged release PR
        id: plan
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git fetch origin main --tags
          git checkout -B main origin/main

          set_output() {
            echo "$1=$2" >> "$GITHUB_OUTPUT"
          }

          CURRENT_VERSION=$(tr -d '[:space:]' < VERSION)
          set_output "action" "publish"
          set_output "target_sha" "$MERGE_SHA"
          set_output "version" "v${CURRENT_VERSION}"

      - name: Tag merged release commit
        id: tag
        if: steps.plan.outputs.action == 'publish'
        env:
          TARGET_SHA: ${{ steps.plan.outputs.target_sha }}
          VERSION_TAG: ${{ steps.plan.outputs.version }}
        run: |
          git fetch origin main --tags

          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Tag $VERSION_TAG already exists. Skipping publish jobs."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "$VERSION_TAG" "$TARGET_SHA"
          git push origin "$VERSION_TAG"
          echo "publish=true" >> "$GITHUB_OUTPUT"

  build:
    needs: release
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.version }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: ios-tokens
          path: build/ios/

      - uses: actions/upload-artifact@v4
        with:
          name: web-tokens
          path: build/web/

  publish-mvn:
    needs: [release, build]
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.version }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Publish to GitHub Packages
        working-directory: android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :nucleus:publishReleasePublicationToGitHubPackagesRepository

  publish-spm:
    needs: [release, build]
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: generated/ios
          fetch-depth: 0
        continue-on-error: true

      - name: Init branch if needed
        run: |
          if ! git rev-parse --verify generated/ios 2>/dev/null; then
            git checkout --orphan generated/ios
            git rm -rf . || true
          fi

      - uses: actions/download-artifact@v4
        with:
          name: ios-tokens
          path: ios-build/

      - name: Copy files to repo root
        run: |
          cp ios-build/Package.swift .
          rm -rf Sources
          cp -r ios-build/Sources .

      - name: Commit and tag
        env:
          TAG: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/
          git commit -m "chore: update ios tokens for ${TAG}" || echo "no changes"
          git tag "${TAG}-ios"
          git push origin generated/ios --tags

  publish-npm:
    needs: [release, build]
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-tokens
          path: web-build/

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@worldcoin"

      - name: Publish to GitHub Packages
        working-directory: web-build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
