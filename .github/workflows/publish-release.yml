name: Publish Design Token Release

on:
  push:
    branches: [main]

concurrency:
  group: publish-release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      tagged: ${{ steps.tag.outputs.tagged }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect merged release PR
        id: plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git fetch origin main --tags
          git checkout -B main origin/main

          PR_JSON=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/commits/$MERGE_SHA/pulls" \
            --jq 'map(select(.merged_at != null)) | .[0]')

          if [ "$PR_JSON" = "null" ] || [ -z "$PR_JSON" ]; then
            echo "No merged PR found for $MERGE_SHA. Skipping publish."
            echo "action=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')

          if [[ "$HEAD_REF" != release/v* ]]; then
            echo "Merged PR was not a release PR ($HEAD_REF). Skipping publish."
            echo "action=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_VERSION=$(tr -d '[:space:]' < VERSION)
          echo "action=publish" >> "$GITHUB_OUTPUT"
          echo "version=v${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Tag merged release commit
        id: tag
        if: steps.plan.outputs.action == 'publish'
        env:
          VERSION_TAG: ${{ steps.plan.outputs.version }}
        run: |
          git fetch origin main --tags

          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Tag $VERSION_TAG already exists."
          else
            git tag "$VERSION_TAG" "$GITHUB_SHA"
            git push origin "$VERSION_TAG"
          fi

          echo "tagged=true" >> "$GITHUB_OUTPUT"

  build:
    needs: release
    if: needs.release.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.version }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: android-tokens
          path: build/android/

      - uses: actions/upload-artifact@v4
        with:
          name: ios-tokens
          path: build/ios/

      - uses: actions/upload-artifact@v4
        with:
          name: web-tokens
          path: build/web/

  publish-mvn:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-tokens
          path: android-build/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        working-directory: android-build
        run: gradle wrapper

      - name: Publish to GitHub Packages
        working-directory: android-build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish

  publish-spm:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: generated/ios
          fetch-depth: 0
        continue-on-error: true

      - name: Init branch if needed
        run: |
          if ! git rev-parse --verify generated/ios 2>/dev/null; then
            git checkout --orphan generated/ios
            git rm -rf . || true
          fi

      - uses: actions/download-artifact@v4
        with:
          name: ios-tokens
          path: ios-build/

      - name: Copy files to repo root
        run: |
          cp ios-build/Package.swift .
          rm -rf Sources
          cp -r ios-build/Sources .

      - name: Commit and tag
        env:
          TAG: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/
          git commit -m "chore: update ios tokens for ${TAG}" || echo "no changes"
          git tag "${TAG}-ios"
          git push origin generated/ios --tags

  publish-npm:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-tokens
          path: web-build/

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@worldcoin"

      - name: Publish to GitHub Packages
        working-directory: web-build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
