name: Verify Builds

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      - name: Verify generated tokens are committed
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated tokens are out of sync with the committed sources. Run 'npm run build' and commit the result."
            exit 1
          fi

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Run Android checks
        working-directory: android
        run: ./gradlew :nucleus:check

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build SPM package
        run: xcodebuild build -scheme Nucleus -destination 'generic/platform=iOS' -skipPackagePluginValidation
