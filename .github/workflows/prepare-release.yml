name: Prepare Nucleus Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: prepare-release-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        !startsWith(github.event.pull_request.head.ref, 'release/v') &&
        (
          contains(github.event.pull_request.labels.*.name, 'major') ||
          contains(github.event.pull_request.labels.*.name, 'minor') ||
          contains(github.event.pull_request.labels.*.name, 'patch')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Plan release PR
        id: plan
        env:
          MANUAL_BUMP: ${{ github.event.inputs.bump || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          git fetch origin main --tags
          git checkout -B main origin/main

          next_version() {
            CURRENT_VERSION="$1"
            BUMP="$2"

            MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
            PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

            case "$BUMP" in
              major) echo "$((MAJOR + 1)).0.0" ;;
              minor) echo "${MAJOR}.$((MINOR + 1)).0" ;;
              patch) echo "${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          }

          release_exists() {
            VERSION_TAG="$1"
            git rev-parse "$VERSION_TAG" >/dev/null 2>&1
          }

          set_output() {
            echo "$1=$2" >> "$GITHUB_OUTPUT"
          }

          CURRENT_VERSION=$(tr -d '[:space:]' < VERSION)
          PREVIOUS_VERSION="v${CURRENT_VERSION}"
          set_output "previous_version" "$PREVIOUS_VERSION"

          if [ -n "$MANUAL_BUMP" ]; then
            BUMP="$MANUAL_BUMP"
            SOURCE="manual"
            SOURCE_PR=""
          else
            RELEASE_LABELS=$(echo "$PR_LABELS" | jq -r '
              map(select(. == "major" or . == "minor" or . == "patch"))
            ')
            RELEASE_LABEL_COUNT=$(echo "$RELEASE_LABELS" | jq 'length')
            BUMP=$(echo "$RELEASE_LABELS" | jq -r '.[0] // empty')
            SOURCE="pr"
            SOURCE_PR="$PR_NUMBER"

            if [ "$RELEASE_LABEL_COUNT" -ne 1 ]; then
              echo "Expected exactly one release label, found $RELEASE_LABEL_COUNT. Skipping release preparation."
              set_output "action" "skip"
              exit 0
            fi
          fi

          NEXT_VERSION=$(next_version "$CURRENT_VERSION" "$BUMP")
          VERSION_TAG="v${NEXT_VERSION}"
          if release_exists "$VERSION_TAG"; then
            echo "Tag $VERSION_TAG already exists. Skipping release preparation."
            set_output "action" "skip"
            exit 0
          fi
          set_output "action" "create_pr"
          set_output "version" "$VERSION_TAG"
          set_output "source" "$SOURCE"
          set_output "source_pr" "$SOURCE_PR"

      - uses: actions/setup-node@v5
        if: steps.plan.outputs.action == 'create_pr'
        with:
          node-version: 22
          cache: npm

      - name: Create release branch and PR
        if: steps.plan.outputs.action == 'create_pr'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.plan.outputs.version }}
          PREVIOUS_VERSION: ${{ steps.plan.outputs.previous_version }}
          SOURCE: ${{ steps.plan.outputs.source }}
          SOURCE_PR: ${{ steps.plan.outputs.source_pr }}
        run: |
          git fetch origin main --tags
          git checkout -B main origin/main

          NEXT_VERSION="${VERSION_TAG#v}"
          RELEASE_BRANCH="release/${VERSION_TAG}"

          EXISTING_PR_URL=$(gh pr list --head "$RELEASE_BRANCH" --base main --state open --json url --jq '.[0].url // empty')
          if [ -n "$EXISTING_PR_URL" ]; then
            echo "Release PR already open: $EXISTING_PR_URL"
            exit 0
          fi

          printf '%s\n' "$NEXT_VERSION" > VERSION
          npm version "$NEXT_VERSION" --no-git-tag-version

          LINK="https://github.com/worldcoin/nucleus/compare/${PREVIOUS_VERSION}...${VERSION_TAG}"
          sed -i "/^# Changelog/a\\\n## ${VERSION_TAG}\n- [Full changelog](${LINK})" CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json package-lock.json CHANGELOG.md
          git commit -m "release: $VERSION_TAG"
          git push origin HEAD:"refs/heads/$RELEASE_BRANCH" --force-with-lease

          if [ "$SOURCE" = "manual" ]; then
            PR_BODY=$'Automated release PR.\n\nTriggered by manual workflow dispatch.'
          else
            PR_BODY=$'Automated release PR.\n\nTriggered by merged PR #'"$SOURCE_PR"$'.'
          fi

          gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "release: $VERSION_TAG" \
            --body "$PR_BODY"
